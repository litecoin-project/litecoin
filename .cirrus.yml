### Global defaults

# Set a strict timeout to prevent zombie instances
timeout_in: 120m 
container:
  # Resource allocation for parallel tasks (16 CPU total available)
  cpu: 2
  memory: 8G  # Set to 8GB to avoid Out of Memory errors
  kvm: true  # Use KVM acceleration for improved virtualization stability
env:
  # Command for installing system packages (e.g., in Debian/Ubuntu containers)
  PACKAGE_MANAGER_INSTALL: "apt-get update && apt-get install -y"
  # Parallel compilation jobs (4 jobs per 2 CPU container)
  MAKEJOBS: "-j4"
  # Flag to indicate CI scripts can modify the temporary host/container system
  DANGER_RUN_CI_ON_HOST: "1"  
  # Minimum port for test runners to avoid conflict with HTTP cache (12321)
  TEST_RUNNER_PORT_MIN: "14000"
  # Ccache configuration for faster recompilation
  CCACHE_SIZE: "200M"
  CCACHE_DIR: "/tmp/ccache_dir"

---

### Global task template

# Template to share common CI settings and caching logic across all tasks
global_task_template: &GLOBAL_TASK_TEMPLATE
  # Skip non-PR runs on the read-only mirror repository
  skip: $CIRRUS_REPO_FULL_NAME == "bitcoin-core/gui" && $CIRRUS_PR == "" 
  
  # Caching for incremental compilation speed
  ccache_cache:
    folder: "/tmp/ccache_dir"
  # Caching for dependency build artifacts
  depends_built_cache:
    folder: "/tmp/cirrus-ci-build/depends/built"
  # Caching for dependency source code (SDKs)
  depends_sdk_cache:
    folder: "/tmp/cirrus-ci-build/depends/sdk-sources"
  # Caching for release artifacts/downloads
  depends_releases_cache:
    folder: "/tmp/cirrus-ci-build/releases"
    
  # Logic to merge the base branch for silent conflict detection in PRs
  merge_base_script:
    - if [ "$CIRRUS_PR" = "" ]; then exit 0; fi
    - bash -c "$PACKAGE_MANAGER_INSTALL git"
    - git fetch $CIRRUS_REPO_CLONE_URL $CIRRUS_BASE_BRANCH
    - git config --global user.email "ci@ci.ci"
    - git config --global user.name "ci"
    - git merge FETCH_HEAD  # Perform the merge
    
  # Main script execution
  ci_script:
    - ./ci/test_run_all.sh

---

### Defined Tasks

task:
  name: 'ARM [GOAL: install] [debian:buster] [unit tests]'
  << : *GLOBAL_TASK_TEMPLATE
  container:
    image: debian:buster
  env:
    FILE_ENV: "./ci/test/00_setup_env_arm.sh"


task:
  # NOTE: Updated name to reflect the actual Catalina image (10.15)
  name: 'macOS Catalina native [GOAL: install] [GUI] [no depends]'
  # Addon script to install dependencies via Homebrew
  macos_brew_addon_script:
    - brew install boost libevent berkeley-db4 qt miniupnpc ccache openssl zeromq qrencode sqlite libtool automake pkg-config gnu-getopt
  << : *GLOBAL_TASK_TEMPLATE
  osx_instance:
    # Uses macOS 10.15 (Catalina) with Xcode 12.1
    image: catalina-xcode-12.1 
  env:
    # Use consistent '1' for truthy value
    DANGER_RUN_CI_ON_HOST: "1" 
    CI_USE_APT_INSTALL: "no"
    PACKAGE_MANAGER_INSTALL: "echo"  # Override apt-get for macOS
    FILE_ENV: "./ci/test/00_setup_env_mac_host.sh"

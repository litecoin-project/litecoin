# appveyor.yml - ULTIMATE CLEAN CONFIGURATION

version: '{branch}.{build}'
skip_tags: true
image: Visual Studio 2019 # Required Windows environment for MSVC 2019 build
configuration: Release
platform: x64
clone_depth: 5

# =======================================================
# ENVIRONMENT VARIABLES
# =======================================================
environment:
  # Use default Python 3.7+ installation path on AppVeyor and ensure UTF-8 compatibility.
  # The path is usually set implicitly, but explicitly set for clarity.
  PYTHONUTF8: 1
  # Pinning Qt static libraries and hash for security and deterministic builds.
  QT_DOWNLOAD_URL: 'https://github.com/sipsorcery/qt_win_binary/releases/download/qt598x64_vs2019_v1681/qt598_x64_vs2019_1681.zip'
  QT_DOWNLOAD_HASH: '00cf7327818c07d74e0b1a4464ffe987c2728b00d49d4bf333065892af0515c3'
  QT_LOCAL_PATH: 'C:\Qt5.9.8_x64_static_vs2019'
  # Vcpkg commit tag for deterministic dependency resolution.
  VCPKG_TAG: '75522bb1f2e7d863078bcd06322348f053a9e33f'

# =======================================================
# INSTALLATION AND SETUP (Vcpkg)
# =======================================================
install:
# [Optional] Install Python dependencies (ZMQ is commented out as per project requirement).
# - cmd: pip install zmq
# Vcpkg setup: Checks out a specific version and builds the binary.
- ps: |
    Write-Host "Setting up Vcpkg...";
    $VCPKG_ROOT = "c:\tools\vcpkg";
    # Use standard C++ build configuration to enforce release builds directly.
    $env:VCPKG_CONFIGURATION = "Release"; 
    
    # Git checkout and bootstrapping
    # -c advice.detachedHead=false used to suppress Git warnings in CI output.
    & git -C "$VCPKG_ROOT" -c advice.detachedHead=false checkout $env:VCPKG_TAG;
    & "$VCPKG_ROOT\bootstrap-vcpkg.bat" > $null;

    # OPTIMIZATION: Removed the manual triplet modification step 
    # as modern Vcpkg/MSBuild supports VCPKG_CONFIGURATION directly.
    # Note: Dependencies are now installed by msbuild using manifest files.
    
    cd "$env:APPVEYOR_BUILD_FOLDER"; # Return to source directory

# =======================================================
# BEFORE BUILD (Qt Static Libraries)
# =======================================================
before_build:
# Download, hash check, and extract the pre-built Qt static libraries.
- ps: |
    Write-Host "Downloading and verifying Qt binaries.";
    $zipFile = "qtdownload.zip";
    $hash = $env:QT_DOWNLOAD_HASH;

    # a. Download
    Invoke-WebRequest -Uri $env:QT_DOWNLOAD_URL -Out $zipFile;
    
    # b. Check Hash (CRITICAL SECURITY STEP)
    Write-Host "Checking hash against $hash...";
    if((Get-FileHash $zipFile).Hash -ne $hash) {
      Write-Host "ERROR: Qt binary download hash mismatch.";
      # Use standard exit code for failure (cleaner than Exit-AppveyorBuild).
      exit 1; 
    }
    
    # c. Extract
    Expand-Archive $zipFile -DestinationPath $env:QT_LOCAL_PATH -Force;
    Write-Host "Qt binary download matched the expected hash and extracted successfully.";

# Run auto-generation scripts (e.g., configure project files).
- cmd: python build_msvc\msvc-autogen.py

# =======================================================
# BUILD
# =======================================================
# Build the solution file using msbuild. TrackFileAccess=false speeds up the build.
build_script:
- cmd: msbuild /p:TrackFileAccess=false build_msvc\bitcoin.sln /m /v:q /nologo

# =======================================================
# AFTER BUILD
# =======================================================
# (Optional: Archive the executables)
after_build:
#- 7z a bitcoin-%APPVEYOR_BUILD_VERSION%.zip %APPVEYOR_BUILD_FOLDER%\build_msvc\%platform%\%configuration%\*.exe

# =======================================================
# TESTING
# =======================================================
test_script:
# Unit tests
- cmd: src\test_bitcoin.exe -l test_suite
# Benchmarks
- cmd: src\bench_bitcoin.exe > NUL
# Python utility tests
- ps: python test\util\bitcoin-util-test.py
- cmd: python test\util\rpcauth-test.py

# Functional tests remain disabled due to known Windows socket issues.
# - cmd: python test\functional\test_runner.py --ci --quiet ...

# =======================================================
# ARTIFACTS AND DEPLOYMENT
# =======================================================
artifacts:
#- path: bitcoin-%APPVEYOR_BUILD_VERSION%.zip
deploy: off
